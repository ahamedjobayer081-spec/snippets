name: Apply spotless

on:
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  apply-spotless:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.repository == 'android/snippets'

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.PAT || github.token }}
        fetch-depth: 0

    - name: set up Java 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Run spotlessApply
      run: ./gradlew spotlessApply --stacktrace

    - name: Auto-commit if spotlessApply has changes
      uses: step-security/git-auto-commit-action@905c3cd6e9ed2b67b4d46ff401fdb6d745d0ff9d # v7.1.0
      with:
        commit_message: Apply Spotless